<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadioWebGenny - Mini Player</title>
<link rel="shortcut icon" href="https://i.postimg.cc/65jjz8t5/ssssssssssssssssssssss.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --card:#0066ff; 
  --accent:#0066ff; 
  --accent2:#3399ff; 
  --text:#ffffff; 
  --muted:#ffffff; 
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:transparent;
  font-family:'DM Sans',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  overflow:hidden;
}

.player-wrap{
  position:relative;
  z-index:1;
  width:280px;
  padding:12px;
  border-radius:18px;
  background:var(--card);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* cornice arcobaleno attorno al player */
.player-wrap::before{
  content:'';
  position:absolute;
  inset:-3px;
  border-radius:21px;
  background: linear-gradient(270deg, red, orange, yellow, green, blue, indigo, violet, red);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  animation: rainbowBorder 5s linear infinite;
  pointer-events:none;
  z-index:2;
}
@keyframes rainbowBorder{
  0%{background: linear-gradient(270deg, red, orange, yellow, green, blue, indigo, violet, red);}
  50%{background: linear-gradient(450deg, red, orange, yellow, green, blue, indigo, violet, red);}
  100%{background: linear-gradient(270deg, red, orange, yellow, green, blue, indigo, violet, red);}
}

.station-label{
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;
  text-align:center;
  margin-bottom:12px;
  color:white;
}

/* cover */
.cover-wrap{
  position:relative;
  width:100%;
  aspect-ratio:1;
  border-radius:14px;
  overflow:hidden;
  margin-bottom:12px;
  background:var(--card);
}
.cover-wrap::before{
  content:'';
  position:absolute;
  inset:-2px;
  border-radius:16px;
  background: linear-gradient(270deg, red, orange, yellow, green, blue, indigo, violet, red);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  animation: rainbowBorder 5s linear infinite;
  pointer-events:none;
  z-index:2;
}

.cover-img{
  width:100%;
  height:100%;
  object-fit:contain;
  opacity:0;
  transition:.5s;
}
.cover-fallback{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}
.cover-fallback img{
  width:160px; 
  max-width:90%;
  object-fit:contain;
}

/* titolo scorrevole tra sbarre verticali */
.marquee-container{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:6px;
  margin-bottom:8px;
}
.marquee-container span{
  font-weight:bold;
  font-size:18px;
}
.marquee-text-wrapper{
  flex:1;
  overflow:hidden;
  white-space:nowrap;
  padding:0 6px;
}
.marquee-text{
  display:inline-block;
  white-space:nowrap;
  animation: scrollTitle 12s linear infinite;
  font-family:'Bebas Neue',sans-serif;
  font-size:16px;
  color:white;
}

@keyframes scrollTitle{
  0%{transform:translateX(100%);}
  100%{transform:translateX(-100%);}
}

.listeners-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
  font-size:10px;
  color:white;
}
.listeners-row svg{color:white;opacity:.9;}
#listeners-count{color:white;font-weight:500;}
</style>
</head>
<body>

<div class="player-wrap">
  <div class="station-label">RadioWebGenny</div>

  <div class="cover-wrap">
    <img id="cover-img" class="cover-img" src="">
    <div class="cover-fallback" id="cover-fallback">
      <img src="https://i.postimg.cc/65jjz8t5/ssssssssssssssssssssss.png" alt="Logo fallback">
    </div>
  </div>

  <div class="marquee-container">
    <span>|</span>
    <div class="marquee-text-wrapper">
      <div class="marquee-text" id="marquee-title">Caricamento…</div>
    </div>
    <span>|</span>
  </div>

  <div class="listeners-row">
    <svg width="10" height="10" viewBox="0 0 24 24">
      <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
    </svg>
    <span id="listeners-count">—</span> ascoltatori in diretta
  </div>
</div>

<script>
const INFO_URL = 'https://sp3.server89.com:7058/7.html';
const coverImg = document.getElementById('cover-img');
const coverFB = document.getElementById('cover-fallback');
const marqueeTitle = document.getElementById('marquee-title');
const listCount = document.getElementById('listeners-count');

async function fetchInfo(){
  try{
    const res = await fetch(INFO_URL);
    const html=await res.text();
    const plain=html.replace(/<[^>]+>/g,'').trim().split(',');
    listCount.textContent = plain[0] || '—';
    const rawTitle = plain.slice(6).join(',').trim();
    if(rawTitle) marqueeTitle.textContent = rawTitle;
    fetchCover(rawTitle);
  }catch{}
  setTimeout(fetchInfo,20000);
}

async function fetchCover(query){
  try{
    if(!query) throw '';
    const r = await fetch('https://itunes.apple.com/search?term='+encodeURIComponent(query)+'&entity=musicTrack&limit=1');
    const d = await r.json();
    if(d.resultCount>0){
      const url=d.results[0].artworkUrl100.replace('100x100','600x600');
      coverImg.src = url; coverImg.style.opacity='1';
      coverFB.style.opacity='0';
    } else {
      coverImg.style.opacity='0'; coverFB.style.opacity='1';
    }
  }catch{
    coverImg.style.opacity='0'; coverFB.style.opacity='1';
  }
}

fetchInfo();
</script>
</body>
</html>
